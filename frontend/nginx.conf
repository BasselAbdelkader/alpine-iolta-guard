server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files
    location /js/ {
        alias /usr/share/nginx/html/js/;
        expires 1h;
    }

    location /css/ {
        alias /usr/share/nginx/html/css/;
        expires 1h;
    }

    # Clean URL routing
    location = / {
        return 301 /login;
    }

    location ~ ^/login/?$ {
        try_files /html/login.html =404;
    }

    location ~ ^/dashboard/?$ {
        try_files /html/dashboard.html =404;
    }

    location ~ ^/clients/?$ {
        try_files /html/clients.html =404;
    }

    # Client detail pages - match /clients/123
    location ~ ^/clients/([0-9]+)$ {
        try_files /html/client-detail.html =404;
    }

    # Client print page - proxy to Django backend for PDF generation
    location ~ ^/clients/print-with-cases/?$ {
        proxy_pass http://backend:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Case detail pages - match /cases/123
    location ~ ^/cases/([0-9]+)$ {
        try_files /html/case-detail.html =404;
    }

    # Case print pages - proxy to backend for PDF generation
    location ~ ^/clients/cases/([0-9]+)/print/?$ {
        proxy_pass http://backend:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/vendors/?$ {
        try_files /html/vendors.html =404;
    }

    # Vendor detail pages - match /vendors/123
    location ~ ^/vendors/([0-9]+)$ {
        try_files /html/vendor-detail.html =404;
    }

    location ~ ^/bank/?$ {
        try_files /html/bank-accounts.html =404;
    }

    location ~ ^/bank-accounts/?$ {
        try_files /html/bank-accounts.html =404;
    }

    location ~ ^/bank-transactions/?$ {
        try_files /html/bank-transactions.html =404;
    }

    location ~ ^/uncleared-transactions/?$ {
        try_files /html/uncleared-transactions.html =404;
    }

    location ~ ^/settlements/?$ {
        try_files /html/settlements.html =404;
    }

    location ~ ^/reports/?$ {
        try_files /html/reports.html =404;
    }

    location ~ ^/checks/?$ {
        try_files /html/print-checks.html =404;
    }

    # Reports sub-pages
    location ~ ^/reports/client-ledger/?$ {
        try_files /html/client-ledger.html =404;
    }

    # Settings page
    location ~ ^/settings/?$ {
        try_files /html/settings.html =404;
    }

    # Import/Export pages
    location ~ ^/import-quickbooks/?$ {
        try_files /html/import-quickbooks.html =404;
    }

    # Enterprise Import Management
    location ~ ^/import-management/?$ {
        try_files /html/import-management.html =404;
    }

    # User Management page
    location ~ ^/user-management/?$ {
        try_files /html/user-management.html =404;
    }


    # Proxy API requests to Django backend
    location /api/ {
        proxy_pass http://backend:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass cookies to backend
        proxy_pass_header Set-Cookie;
        proxy_cookie_path / /;
    }

    # Fallback
    location / {
        try_files $uri $uri/ /html/dashboard.html;
    }
}
