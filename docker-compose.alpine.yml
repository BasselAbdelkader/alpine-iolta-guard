version: '3.8'

# ============================================================================
# IOLTA Guard - Alpine Linux Production Configuration
# ============================================================================
# Optimized for 100+ firm multi-tenant deployment
# All services use Alpine Linux for:
#   - Smaller image sizes (60% reduction)
#   - Better security (musl libc)
#   - Faster deployments
# ============================================================================

services:
  # ==========================================================================
  # PostgreSQL Database - Alpine Linux
  # ==========================================================================
  database:
    image: postgres:16-alpine3.20
    container_name: iolta_db_alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-iolta_guard_db}
      - POSTGRES_USER=${DB_USER:-iolta_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
      - TZ=UTC
    volumes:
      # Persistent data storage
      - postgres_data:/var/lib/postgresql/data
      # Auto-initialize database from SQL backup
      - ./database/init:/docker-entrypoint-initdb.d:ro
      # Backup directory
      - ./backups:/backups
    networks:
      - iolta_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-iolta_user} -d ${DB_NAME:-iolta_guard_db}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # Security: Don't expose database port publicly
    # Only accessible within Docker network
    expose:
      - "5432"
    # Resource limits (commented out for compatibility with low-CPU systems)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 2G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M

  # ==========================================================================
  # Backend - Django Application (Alpine Linux)
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.alpine.backend
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: iolta-guard-backend-alpine:latest
    container_name: iolta_backend_alpine
    environment:
      # Django Configuration
      - DJANGO_SETTINGS_MODULE=trust_account_project.settings
      - DEBUG=False
      # Database Connection
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=${DB_USER:-iolta_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-iolta_guard_db}
      # Security
      - SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend,${PRODUCTION_DOMAIN:-138.68.109.92}
      # Performance
      - PYTHONUNBUFFERED=1
      - GUNICORN_WORKERS=4
      - GUNICORN_TIMEOUT=120
      # Timezone
      - TZ=UTC
    volumes:
      # Static files (shared with frontend)
      - backend_static:/app/staticfiles
      # Media files (user uploads)
      - backend_media:/app/media
      # Application logs
      - backend_logs:/app/logs
      # Configuration (read-only)
      - ./config/account.json:/app/config/account.json:ro
    # Backend NOT publicly exposed - only through nginx reverse proxy
    expose:
      - "8002"
    networks:
      - iolta_network
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    # Resource limits (commented out for compatibility with low-CPU systems)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 2G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M

  # ==========================================================================
  # Frontend - Nginx (Alpine Linux)
  # ==========================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.alpine.frontend
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: iolta-guard-frontend-alpine:latest
    container_name: iolta_frontend_alpine
    # Only frontend is publicly accessible
    ports:
      - "80:80"
    volumes:
      # Nginx configuration (read-only)
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Backend static files (Django admin, DRF)
      - backend_static:/usr/share/nginx/html/static:ro
      # Nginx cache
      - nginx_cache:/var/cache/nginx
    networks:
      - iolta_network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Resource limits (commented out for compatibility with low-CPU systems)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.0'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.25'
    #       memory: 128M

# ============================================================================
# Volumes - Persistent Data Storage
# ============================================================================
volumes:
  # Database data - CRITICAL: Don't delete unless intentional
  postgres_data:
    driver: local

  # Backend static files (Django admin, DRF browsable API)
  backend_static:
    driver: local

  # User uploaded files (if any)
  backend_media:
    driver: local

  # Application logs
  backend_logs:
    driver: local

  # Nginx cache
  nginx_cache:
    driver: local

# ============================================================================
# Networks - Internal Communication
# ============================================================================
networks:
  iolta_network:
    driver: bridge
    # Enable IPv6 if needed
    # enable_ipv6: true
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ============================================================================
# DEPLOYMENT NOTES
# ============================================================================
#
# Image Sizes (Approximate):
#   - Database:  ~260MB (postgres:16-alpine3.20)
#   - Backend:   ~350MB (Alpine + Python + dependencies)
#   - Frontend:  ~45MB  (nginx:alpine)
#   - Total:     ~655MB (vs ~1.2GB for Debian-based)
#
# Security Features:
#   - All services use Alpine Linux (musl libc)
#   - Non-root user execution in backend
#   - Database and backend NOT exposed publicly
#   - Only frontend accessible from internet
#   - Health checks on all services
#   - Resource limits to prevent DoS
#
# Performance:
#   - Multi-stage builds minimize image size
#   - Layer caching for faster rebuilds
#   - Gunicorn with 4 workers (adjust based on CPU cores)
#   - PostgreSQL optimized for IOLTA workload
#
# Scalability (100+ firms):
#   - Each firm can run separate stack (isolated data)
#   - Or single stack with tenant isolation (shared resources)
#   - Smaller images = faster deployment
#   - Lower memory footprint = more containers per host
#
# ============================================================================
# QUICK START
# ============================================================================
#
# 1. Configure environment:
#    cp .env.template .env
#    nano .env  # Set DB_PASSWORD and DJANGO_SECRET_KEY
#
# 2. Build images:
#    docker-compose -f docker-compose.alpine.yml build
#
# 3. Start services:
#    docker-compose -f docker-compose.alpine.yml up -d
#
# 4. Check status:
#    docker-compose -f docker-compose.alpine.yml ps
#
# 5. View logs:
#    docker-compose -f docker-compose.alpine.yml logs -f
#
# 6. Stop services:
#    docker-compose -f docker-compose.alpine.yml down
#
# ============================================================================
